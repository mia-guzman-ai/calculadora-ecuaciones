<script>
let grafica1 = null;
let grafica2 = null;

function resolverLineal() {
    let a = parseFloat(document.getElementById("a").value);
    let b = parseFloat(document.getElementById("b").value);

    if (isNaN(a) || isNaN(b)) {
        alert("Ingresa valores válidos");
        return;
    }

    fetch("/lineal", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({a: a, b: b})
    })
    .then(res => res.json())
    .then(data => {
        document.getElementById("resLineal").innerText = data.resultado;

        if (grafica1) grafica1.destroy();

        let ctx = document.getElementById("graficaLineal").getContext("2d");
        grafica1 = new Chart(ctx, {
            type: "line",
            data: {
                labels: data.x,
                datasets: [{
                    label: "y = ax + b",
                    data: data.y,
                    borderWidth: 2
                }]
            }
        });
    });
}

function resolverCuadratica() {
    let a = parseFloat(document.getElementById("a2").value);
    let b = parseFloat(document.getElementById("b2").value);
    let c = parseFloat(document.getElementById("c2").value);

    if (isNaN(a) || isNaN(b) || isNaN(c)) {
        alert("Ingresa valores válidos");
        return;
    }

    fetch("/cuadratica", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({a: a, b: b, c: c})
    })
    .then(res => res.json())
    .then(data => {
        document.getElementById("resCuad").innerText = data.resultado;

        if (grafica2) grafica2.destroy();

        let ctx = document.getElementById("graficaCuad").getContext("2d");
        grafica2 = new Chart(ctx, {
            type: "line",
            data: {
                labels: data.x,
                datasets: [{
                    label: "y = ax² + bx + c",
                    data: data.y,
                    borderWidth: 2
                }]
            }
        });
    });
}
</script>
</body>
</html>
