<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Calculadora Matemática Pro</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg, #4facfe, #00f2fe);
}

.container {
    max-width: 900px;
    margin: 40px auto;
    background: white;
    padding: 25px;
    border-radius: 15px;
}

h1, h2 {
    text-align: center;
}

button {
    padding: 10px;
    margin: 8px 0;
    width: 100%;
    border: none;
    border-radius: 8px;
    background: #4facfe;
    color: white;
    font-size: 16px;
    cursor: pointer;
}

button:hover {
    background: #0077ff;
}

input {
    width: 95%;
    padding: 10px;
    margin: 5px 0;
}

.section {
    display: none;
}

.active {
    display: block;
}

canvas {
    margin-top: 15px;
}
</style>
</head>

<body>

<div class="container">

<!-- MENU -->
<div id="menu" class="section active">
    <h1>📊 Bienvenido</h1>
    <p>Selecciona el tipo de ecuación:</p>

    <button onclick="mostrar('lineal')">Ecuación Lineal</button>
    <button onclick="mostrar('cuadratica')">Ecuación Cuadrática</button>
    <button onclick="mostrar('sistema')">Sistema 2x2</button>
</div>

<!-- LINEAL -->
<div id="lineal" class="section">
<h2>Ecuación Lineal</h2>
<p>y = mx + b → Representa una recta.</p>

<input id="m" placeholder="Pendiente (m)">
<input id="b" placeholder="Valor inicial (b)">

<button onclick="calcLineal()">Calcular</button>
<button onclick="limpiar()">Limpiar</button>
<button onclick="mostrar('menu')">Regresar</button>

<div id="graficaLineal"></div>
</div>

<!-- CUADRATICA -->
<div id="cuadratica" class="section">
<h2>Ecuación Cuadrática</h2>
<p>ax² + bx + c → Representa una parábola.</p>

<input id="a" placeholder="Valor de a">
<input id="b2" placeholder="Valor de b">
<input id="c" placeholder="Valor de c">

<button onclick="calcCuadratica()">Calcular</button>
<button onclick="limpiar()">Limpiar</button>
<button onclick="mostrar('menu')">Regresar</button>

<div id="graficaCuad"></div>
</div>

<!-- SISTEMA -->
<div id="sistema" class="section">
<h2>Sistema 2x2</h2>
<p>Dos ecuaciones con dos incógnitas.</p>

<input id="a1" placeholder="a (ecuación 1)">
<input id="b1" placeholder="b (ecuación 1)">
<input id="c1" placeholder="c (ecuación 1)">

<input id="a2" placeholder="a (ecuación 2)">
<input id="b2s" placeholder="b (ecuación 2)">
<input id="c2" placeholder="c (ecuación 2)">

<button onclick="calc2()">Calcular</button>
<button onclick="limpiar()">Limpiar</button>
<button onclick="mostrar('menu')">Regresar</button>

<div id="res2"></div>
</div>

</div>

<script>

function mostrar(id){
    document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

function limpiar(){
    document.querySelectorAll('input').forEach(i=>i.value="");
    document.querySelectorAll('[id^="grafica"], #res2').forEach(g=>g.innerHTML="");
}

// LINEAL
function calcLineal(){
    fetch("/lineal", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({
            tipo:"punto_pendiente",
            m: parseFloat(m.value),
            x1: 0,
            y1: parseFloat(b.value)
        })
    })
    .then(r=>r.json())
    .then(d=>{
        graficaLineal.innerHTML = `
            <p>${d.resultado}</p>
            <canvas id="chartL" width="400" height="250"></canvas>
        `;
        dibujarGrafica("chartL", d.x, d.y);
    });
}

// CUADRATICA
function calcCuadratica(){
    fetch("/cuadratica", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({
            a: parseFloat(a.value),
            b: parseFloat(b2.value),
            c: parseFloat(c.value)
        })
    })
    .then(r=>r.json())
    .then(d=>{
        graficaCuad.innerHTML = `
            <p>${d.resultado}</p>
            <canvas id="chartC" width="400" height="250"></canvas>
        `;
        dibujarGrafica("chartC", d.x, d.y);
    });
}

// SISTEMA
function calc2(){
    fetch("/sistema", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({
            a: parseFloat(a1.value),
            b: parseFloat(b1.value),
            c: parseFloat(c1.value),
            d: parseFloat(a2.value),
            e: parseFloat(b2s.value),
            f: parseFloat(c2.value)
        })
    })
    .then(r=>r.json())
    .then(d=>{
        res2.innerHTML = `
            <p>${d.resultado}</p>
            <canvas id="chartS" width="400" height="250"></canvas>
        `;
        dibujarSistema("chartS", d.x, d.y1, d.y2);
    });
}

// GRAFICAS
function dibujarGrafica(id, x, y){
    new Chart(document.getElementById(id), {
        type: 'line',
        data: {
            labels: x,
            datasets: [{data: y}]
        },
        options: {responsive:false}
    });
}

function dibujarSistema(id, x, y1, y2){
    new Chart(document.getElementById(id), {
        type: 'line',
        data: {
            labels: x,
            datasets: [
                {data: y1},
                {data: y2}
            ]
        },
        options: {responsive:false}
    });
}

</script>

</body>
</html>
