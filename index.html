<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Calculadora Matemática Pro</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg, #4facfe, #00f2fe);
}

.container {
    max-width: 900px;
    margin: 40px auto;
    background: white;
    padding: 25px;
    border-radius: 15px;
}

h1, h2 {
    text-align: center;
}

button {
    padding: 10px;
    margin: 10px 0;
    width: 100%;
    border: none;
    border-radius: 8px;
    background: #4facfe;
    color: white;
    font-size: 16px;
    cursor: pointer;
}

button:hover {
    background: #0077ff;
}

input {
    width: 95%;
    padding: 10px;
    margin: 5px 0;
}

.section {
    display: none;
}

.active {
    display: block;
}

#grafica img {
    width: 60%;
}
</style>

</head>

<body>

<div class="container">

<!-- 🏠 MENU -->
<div id="menu" class="section active">
    <h1>📊 Bienvenido</h1>
    <p>Selecciona el método que deseas usar:</p>

    <button onclick="mostrar('lineal')">Ecuación Lineal</button>
    <button onclick="mostrar('cuadratica')">Ecuación Cuadrática</button>
    <button onclick="mostrar('sistema2')">Sistema 2x2</button>
    <button onclick="mostrar('sistema3')">Sistema 3x3</button>
</div>

<!-- 📈 LINEAL -->
<div id="lineal" class="section">
<h2>Ecuación Lineal</h2>
<p>Forma: y = mx + b. Sirve para representar rectas.</p>

<input id="m" placeholder="Pendiente m (ej: 2)">
<input id="b" placeholder="Intersección b (ej: 3)">

<button onclick="calcLineal()">Calcular</button>
<button onclick="limpiar()">Limpiar</button>
<button onclick="mostrar('menu')">Regresar</button>

<div id="graficaLineal"></div>
</div>

<!-- 📉 CUADRATICA -->
<div id="cuadratica" class="section">
<h2>Ecuación Cuadrática</h2>
<p>Forma: ax² + bx + c. Sirve para parábolas.</p>

<input id="a" placeholder="a">
<input id="b2" placeholder="b">
<input id="c" placeholder="c">

<button onclick="calcCuadratica()">Calcular</button>
<button onclick="limpiar()">Limpiar</button>
<button onclick="mostrar('menu')">Regresar</button>

<div id="graficaCuad"></div>
</div>

<!-- 🔢 SISTEMA 2x2 -->
<div id="sistema2" class="section">
<h2>Sistema 2x2</h2>
<p>Dos ecuaciones con dos incógnitas.</p>

<input id="a1" placeholder="a1">
<input id="b1" placeholder="b1">
<input id="c1" placeholder="c1">

<input id="a2" placeholder="a2">
<input id="b2s" placeholder="b2">
<input id="c2" placeholder="c2">

<button onclick="calc2()">Calcular</button>
<button onclick="limpiar()">Limpiar</button>
<button onclick="mostrar('menu')">Regresar</button>

<div id="res2"></div>
</div>

<!-- 🔢 SISTEMA 3x3 -->
<div id="sistema3" class="section">
<h2>Sistema 3x3</h2>
<p>Tres ecuaciones con tres incógnitas.</p>

<input placeholder="a1"><input placeholder="b1"><input placeholder="c1"><input placeholder="d1">
<input placeholder="a2"><input placeholder="b2"><input placeholder="c2"><input placeholder="d2">
<input placeholder="a3"><input placeholder="b3"><input placeholder="c3"><input placeholder="d3">

<button onclick="calc3()">Calcular</button>
<button onclick="limpiar()">Limpiar</button>
<button onclick="mostrar('menu')">Regresar</button>

<div id="res3"></div>
</div>

</div>

<script>

// navegación
function mostrar(id){
    document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

// limpiar
function limpiar(){
    document.querySelectorAll('input').forEach(i=>i.value="");
    document.querySelectorAll('[id^="grafica"]').forEach(g=>g.innerHTML="");
}

// LINEAL
function calcLineal(){
    fetch("/lineal", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({
            tipo:"pendiente",
            m: parseFloat(m.value),
            b: parseFloat(b.value)
        })
    })
    .then(r=>r.json())
    .then(d=>{
        graficaLineal.innerHTML = `<img src="data:image/png;base64,${d.grafica}">`;
    });
}

// CUADRATICA
function calcCuadratica(){
    fetch("/cuadratica", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({
            a: parseFloat(a.value),
            b: parseFloat(b2.value),
            c: parseFloat(c.value)
        })
    })
    .then(r=>r.json())
    .then(d=>{
        graficaCuad.innerHTML = `<img src="data:image/png;base64,${d.grafica}">`;
    });
}

// 2x2
function calc2(){
    fetch("/sistema2", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({
            a1:a1.value,b1:b1.value,c1:c1.value,
            a2:a2.value,b2:b2s.value,c2:c2.value
        })
    })
    .then(r=>r.json())
    .then(d=>{
        res2.innerHTML = JSON.stringify(d);
    });
}

// 3x3
function calc3(){
    fetch("/sistema3", {
        method:"POST"
    })
    .then(r=>r.json())
    .then(d=>{
        res3.innerHTML = JSON.stringify(d);
    });
}

</script>

</body>
</html>

</body>
</html>
