<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Solver Pro Max</title>
<link rel="stylesheet" href="/static/style.css">

<script>
function mostrar(opcion){
    document.querySelectorAll(".seccion").forEach(e=>e.style.display="none");
    document.getElementById(opcion).style.display="block";
}
</script>
</head>

<body>

<div class="bienvenida">
    <h1>🔥 Solver Matemático Pro Max</h1>
    <p>Resuelve diferentes tipos de ecuaciones fácilmente</p>
</div>

<div class="menu">
    <button onclick="mostrar('lineal')">Lineal</button>
    <button onclick="mostrar('cuadratica')">Cuadrática</button>
    <button onclick="mostrar('sistema2')">2x2</button>
    <button onclick="mostrar('sistema3')">3x3</button>
    <button onclick="mostrar('exponencial')">Exponencial</button>
</div>

<!-- LINEAL -->
<div id="lineal" class="seccion">
<h2>y = mx + b</h2>
<form method="post">
<input type="hidden" name="metodo" value="lineal">
<input name="m" placeholder="Pendiente (m)">
<input name="b" placeholder="Intersección (b)">
<button>Resolver</button>
<button type="reset">Limpiar</button>
</form>
</div>

<!-- CUADRATICA -->
<div id="cuadratica" class="seccion">
<h2>ax² + bx + c</h2>
<form method="post">
<input type="hidden" name="metodo" value="cuadratica">
<input name="a" placeholder="a">
<input name="b" placeholder="b">
<input name="c" placeholder="c">
<button>Resolver</button>
</form>
</div>

<!-- 2x2 -->
<div id="sistema2" class="seccion">
<h2>Sistema 2x2</h2>
<form method="post">
<input type="hidden" name="metodo" value="sistema2">
<input name="a1" placeholder="a1">
<input name="b1" placeholder="b1">
<input name="c1" placeholder="c1">
<input name="a2" placeholder="a2">
<input name="b2" placeholder="b2">
<input name="c2" placeholder="c2">
<button>Resolver</button>
</form>
</div>

<!-- 3x3 -->
<div id="sistema3" class="seccion">
<h2>Sistema 3x3</h2>
<form method="post">
<input type="hidden" name="metodo" value="sistema3">
<input name="a1"><input name="b1"><input name="c1"><input name="d1">
<input name="a2"><input name="b2"><input name="c2"><input name="d2">
<input name="a3"><input name="b3"><input name="c3"><input name="d3">
<button>Resolver</button>
</form>
</div>

<!-- EXPONENCIAL -->
<div id="exponencial" class="seccion">
<h2>y = a^x</h2>
<form method="post">
<input type="hidden" name="metodo" value="exponencial">
<input name="a" placeholder="Base (a)">
<button>Resolver</button>
<button type="reset">Limpiar</button>
</form>
</div>

<!-- RESULTADO -->
{% if resultado %}
<div class="resultado">
<h2>Resultado</h2>
<p>{{resultado}}</p>

{% if grafica %}
<img src="data:image/png;base64,{{grafica}}">
{% endif %}
</div>
{% endif %}

</body>
</html>
