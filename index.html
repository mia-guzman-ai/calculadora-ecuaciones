<!DOCTYPE html>
<html>
<head>
    <title>Calculadora</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<h2>Lineal (pendiente)</h2>
<input id="a" placeholder="a">
<input id="b" placeholder="b">
<button onclick="lineal()">Resolver</button>
<p id="res1"></p>
<canvas id="graf1"></canvas>

<h2>Lineal (2 puntos)</h2>
<input id="x1" placeholder="x1">
<input id="y1" placeholder="y1">
<input id="x2" placeholder="x2">
<input id="y2" placeholder="y2">
<button onclick="lineal2()">Resolver</button>

<h2>Cuadrática</h2>
<input id="ca" placeholder="a">
<input id="cb" placeholder="b">
<input id="cc" placeholder="c">
<button onclick="cuadratica()">Resolver</button>
<p id="res2"></p>
<canvas id="graf2"></canvas>

<h2>Sistema 2x2</h2>
<input id="sa" placeholder="a">
<input id="sb" placeholder="b">
<input id="sc" placeholder="c">
<br>
<input id="sd" placeholder="d">
<input id="se" placeholder="e">
<input id="sf" placeholder="f">
<br>
<button onclick="sistema()">Resolver</button>
<p id="res3"></p>

<script>
let chart1, chart2;

function lineal() {
    fetch("/lineal", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({
            tipo:"pendiente",
            a:parseFloat(a.value),
            b:parseFloat(b.value)
        })
    })
    .then(r=>r.json())
    .then(data=>{
        res1.innerText = data.resultado
        graficar(data.x, data.y, "graf1", chart1, (c)=>chart1=c)
    })
}

function lineal2() {
    fetch("/lineal", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({
            tipo:"dos_puntos",
            x1:parseFloat(x1.value),
            y1:parseFloat(y1.value),
            x2:parseFloat(x2.value),
            y2:parseFloat(y2.value)
        })
    })
    .then(r=>r.json())
    .then(data=>{
        res1.innerText = data.resultado
        graficar(data.x, data.y, "graf1", chart1, (c)=>chart1=c)
    })
}

function cuadratica() {
    fetch("/cuadratica", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({
            a:parseFloat(ca.value),
            b:parseFloat(cb.value),
            c:parseFloat(cc.value)
        })
    })
    .then(r=>r.json())
    .then(data=>{
        res2.innerText = data.resultado
        graficar(data.x, data.y, "graf2", chart2, (c)=>chart2=c)
    })
}

function sistema() {
    fetch("/sistema", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({
            tipo:"directo",
            a:parseFloat(sa.value),
            b:parseFloat(sb.value),
            c:parseFloat(sc.value),
            d:parseFloat(sd.value),
            e:parseFloat(se.value),
            f:parseFloat(sf.value)
        })
    })
    .then(r=>r.json())
    .then(data=>{
        res3.innerText = data.resultado
    })
}

function graficar(x, y, id, chart, setChart){
    if(chart) chart.destroy()

    const ctx = document.getElementById(id)

    setChart(new Chart(ctx, {
        type: "line",
        data: {
            labels: x,
            datasets: [{
                label: "Gráfica",
                data: y
            }]
        }
    }))
}
</script>

</body>
</html>
</body>
</html>
