<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Calculadora Matemática</title>
<style>

body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: #333;
}

.container {
    max-width: 900px;
    margin: 40px auto;
    background: white;
    padding: 25px;
    border-radius: 15px;
    box-shadow: 0px 10px 25px rgba(0,0,0,0.2);
}

h1 {
    text-align: center;
    color: #444;
}

.card {
    margin-top: 20px;
    padding: 20px;
    border-radius: 12px;
    background: #f7f7f7;
}

label {
    display: block;
    margin-top: 10px;
    font-weight: bold;
}

input {
    width: 95%;
    padding: 10px;
    margin-top: 5px;
    border-radius: 8px;
    border: 1px solid #ccc;
}

small {
    color: #666;
}

button {
    margin-top: 15px;
    padding: 12px;
    width: 100%;
    border: none;
    border-radius: 10px;
    background: #667eea;
    color: white;
    font-size: 16px;
    cursor: pointer;
}

button:hover {
    background: #5a67d8;
}

#grafica {
    margin-top: 20px;
    text-align: center;
}

#grafica img {
    width: 70%;   /* 🔥 más pequeña */
    border-radius: 10px;
}

</style>
</head>

<body>

<div class="container">

<h1>📊 Calculadora Matemática</h1>

<div class="card">

<h3>📈 Ecuación Lineal</h3>

<label>Valor de m (pendiente)</label>
<input id="m" placeholder="Ej: 2">
<small>Indica qué tan inclinada es la recta</small>

<label>Valor de b (intersección)</label>
<input id="b" placeholder="Ej: 3">
<small>Donde la recta corta el eje Y</small>

<button onclick="calcular()">Calcular</button>

</div>

<div id="grafica"></div>

</div>

<script>

function calcular() {

    let m = document.getElementById("m").value;
    let b = document.getElementById("b").value;

    fetch("/lineal", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            tipo: "pendiente",
            m: parseFloat(m),
            b: parseFloat(b)
        })
    })
    .then(res => res.json())
    .then(data => {

        document.getElementById("grafica").innerHTML =
            `<img src="data:image/png;base64,${data.grafica}">`;

    });

}

</script>

</body>
</html>
